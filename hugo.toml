# ============ PARAMETROS DEL TEMA ============
[params]
  env = "production"
  author = "r3df0x1-c"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = false
  comments = false
  mainSections = ["none"]

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/r3df0x1-c"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/christian-servin-ruiz/"

  [[params.socialIcons]]
