# ============ RESALTADO DE CODIGO ============
[markup]
  [markup.highlight]
    style = "github-dark"
    lineNos = false
    codeFences = true
    guessSyntax = true
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

# ============ SALIDA RSS/JSON ============
[outputs]
  home = ["HTML", "RSS", "JSON"]